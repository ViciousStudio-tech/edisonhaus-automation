name: B3 Order Fulfiller

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours
  workflow_dispatch:

jobs:
  fulfill-orders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Fulfill Orders
        env:
          SHOPIFY_STORE: "fgtyz6-bj.myshopify.com"
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          CJ_API_KEY: ${{ secrets.CJ_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          DB_PATH: "data/dropship.db"
        run: python b3_order_fulfiller.py

      - name: Commit DB and heartbeat
        run: |
          git config user.name "EdisonHaus Bot"
          git config user.email "bot@edisonhaus.store"
          mkdir -p data
          git add -f data/dropship.db b3_fulfillment_heartbeat.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "B3 fulfiller run $(date +%Y-%m-%d-%H%M) [skip ci]"
          git push origin main || true
