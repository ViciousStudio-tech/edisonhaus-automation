name: B3 Support Digest

on:
  schedule:
    - cron: '0 13 * * *'  # 8am EST / 1pm UTC daily
  workflow_dispatch:

jobs:
  daily-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Send Daily Digest
        env:
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          CJ_API_KEY: ${{ secrets.CJ_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
        run: python b3_support_digest.py

      - name: Commit heartbeat
        run: |
          git config user.name "EdisonHaus Bot"
          git config user.email "bot@edisonhaus.store"
          mkdir -p data
          git add -f data/support_digest_heartbeat.json 2>/dev/null || true
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add -f data/support_digest_heartbeat.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "B3 support digest $(date +%Y-%m-%d) [skip ci]"
          git push origin main || true
