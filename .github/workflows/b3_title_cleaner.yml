name: B3 Title Cleaner
on:
  workflow_dispatch:
  schedule:
    - cron: '30 5 * * 3'  # 1:30am EST Wednesday (once a week)
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run title cleaner
        env:
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python b3_title_cleaner.py
      - name: Commit results
        run: |
          git config user.name "EdisonHaus Bot"
          git config user.email "bot@edisonhaus.store"
          git add -f data/ 2>/dev/null || true
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add -f data/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Title cleaner run $(date +%Y-%m-%d) [skip ci]"
          git push origin main
