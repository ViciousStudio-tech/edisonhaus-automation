name: B3 Store Manager

on:
  schedule:
    - cron: '0 8 * * 2,5'  # Tue & Fri 8am UTC (after product finder)
  workflow_dispatch:

jobs:
  list-products:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install anthropic requests

      - name: List Products to Shopify
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHOPIFY_STORE: "fgtyz6-bj.myshopify.com"
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          LISTINGS_PER_RUN: "10"
          DB_PATH: "data/dropship.db"
        run: python b3_store_manager.py

      - name: Commit DB and heartbeat
        run: |
          git config user.name "EdisonHaus Bot"
          git config user.email "bot@edisonhaus.store"
          mkdir -p data
          git add -f data/dropship.db b3_store_heartbeat.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "B3 store manager run $(date +%Y-%m-%d) [skip ci]"
          git push origin main || true
