name: B3 Product Finder

on:
  schedule:
    - cron: '0 6 * * 1,4'  # Mon & Thu 6am UTC
  workflow_dispatch:

jobs:
  find-products:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install anthropic requests pytrends

      - name: Find Products
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CJ_EMAIL: ${{ secrets.CJ_EMAIL }}
          CJ_PASSWORD: ${{ secrets.CJ_PASSWORD }}
          PRODUCTS_PER_RUN: "20"
          MIN_SCORE: "6"
          DB_PATH: "data/dropship.db"
        run: python b3_product_finder.py

      - name: Commit DB and heartbeat
        run: |
          git config user.name "VibeFinds Bot"
          git config user.email "bot@vibefinds.store"
          mkdir -p data
          git add -f data/dropship.db b3_product_heartbeat.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "B3 product finder $(date +%Y-%m-%d) [skip ci]"
          git push origin main || true
