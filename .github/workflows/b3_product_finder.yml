name: B3 Product Finder

on:
  schedule:
    - cron: '0 6 * * 1,4'  # Mon & Thu 6am UTC
  workflow_dispatch:

jobs:
  find-products:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic requests
      - name: Restore DB
        uses: actions/cache@v4
        with:
          path: dropship.db
          key: dropship-db-${{ github.run_id }}
          restore-keys: dropship-db-
      - name: Find Products
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALIEXPRESS_APP_KEY: ${{ secrets.ALIEXPRESS_APP_KEY }}
          ALIEXPRESS_SECRET: ${{ secrets.ALIEXPRESS_SECRET }}
          PRODUCTS_PER_RUN: "20"
        run: python b3_product_finder.py
      - name: Save DB
        uses: actions/cache/save@v4
        with:
          path: dropship.db
          key: dropship-db-${{ github.run_id }}
