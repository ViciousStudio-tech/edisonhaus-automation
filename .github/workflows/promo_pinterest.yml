name: Promo — Pinterest Auto-Poster
on:
  schedule:
    - cron: '0 14 * * *'  # 10am EST daily
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run Pinterest poster
        env:
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
        run: python promo_pinterest.py
      - name: Commit results
        run: |
          git config user.name "EdisonHaus Bot"
          git config user.email "bot@edisonhaus.store"
          git add -f data/ 2>/dev/null || true
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add -f data/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Pinterest: daily pins $(date +%Y-%m-%d) [skip ci]"
          git push origin main
