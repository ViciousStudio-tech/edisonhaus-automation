name: B3 AI Optimizer

on:
  schedule:
    - cron: '0 9 * * 0'  # Sunday 9am UTC
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install anthropic requests

      - name: Optimize listings and report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHOPIFY_STORE: "fgtyz6-bj.myshopify.com"
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          DB_PATH: "data/dropship.db"
        run: python b3_ai_optimizer.py

      - name: Commit DB and heartbeat
        run: |
          git config user.name "EdisonHaus Bot"
          git config user.email "bot@edisonhaus.store"
          mkdir -p data
          git add -f data/dropship.db b3_optimizer_heartbeat.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "B3 optimizer run $(date +%Y-%m-%d) [skip ci]"
          git push origin main || true
