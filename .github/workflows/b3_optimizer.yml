name: B3 AI Optimizer

on:
  schedule:
    - cron: '0 9 * * 0'  # Every Sunday 9am UTC
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic requests
      - name: Restore DB
        uses: actions/cache@v4
        with:
          path: dropship.db
          key: dropship-db-latest
          restore-keys: dropship-db-
      - name: Run Optimizer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHOPIFY_STORE: "fgtyz6-bj.myshopify.com"
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python b3_ai_optimizer.py
      - name: Save DB
        uses: actions/cache/save@v4
        with:
          path: dropship.db
          key: dropship-db-${{ github.run_id }}
